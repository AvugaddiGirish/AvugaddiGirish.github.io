<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIRISH — AI Automation Engineer</title>
    <meta name="description" content="Avugaddi Girish — AI Automation Engineer. Interactive 2D vector portfolio.">

    <meta name="theme-color" content="#0D0D0D">

    <meta property="og:title" content="GIRISH — AI Automation Engineer">
    <meta property="og:description"
        content="Portfolio of Avugaddi Girish. Exploring AI, Python automation, and generative design.">
    <meta property="og:image" content="https://yourwebsite.com/preview.png">
    <meta property="og:url" content="https://yourwebsite.com">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            background: #0D0D0D;
            color: #F5F5F5;
            cursor: default;
            /* Prevent mobile pull-to-refresh bounce */
            overscroll-behavior: none;
        }

        /* ═══════════════════════════════════════════════════
   MAIN VIEWPORT
   ═══════════════════════════════════════════════════ */
        #viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ═══════════════════════════════════════════════════
   GENERATIVE BACKGROUND CANVAS
   ═══════════════════════════════════════════════════ */
        #bgCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ═══════════════════════════════════════════════════
   CENTERPIECE SVG TITLE
   ═══════════════════════════════════════════════════ */
        #titleWrap {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            user-select: none;
        }

        #mainTitle {
            width: min(90vw, 1100px);
            height: auto;
            overflow: visible;
            cursor: pointer;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Tactile press effect for the title */
        #mainTitle:active {
            transform: scale(0.95);
        }

        #mainTitle text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
        }

        .title-stroke {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: strokeDraw 3s ease forwards, strokeLoop 8s ease-in-out 3s infinite alternate;
        }

        .stroke-yellow {
            stroke: #FFE500;
        }

        .stroke-pink {
            stroke: #FF2D6B;
        }

        .stroke-cyan {
            stroke: #00F0FF;
        }

        .title-fill {
            fill: #F5F5F5;
            opacity: 0;
            animation: fillReveal 1s ease 2.4s forwards;
        }

        @keyframes strokeDraw {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes strokeLoop {

            0%,
            100% {
                stroke-dashoffset: 0;
            }

            50% {
                stroke-dashoffset: 120;
            }
        }

        @keyframes fillReveal {
            to {
                opacity: 1;
            }
        }

        /* Subtitle */
        .subtitle {
            font-size: clamp(0.7rem, 1.4vw, 1.1rem);
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: #888;
            opacity: 0;
            animation: fadeUp 1s ease 3s forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ═══════════════════════════════════════════════════
   FLOATING NAV OBJECTS (BOTTOM DOCK ALIGNMENT)
   ═══════════════════════════════════════════════════ */
        .nav-object {
            position: absolute;
            z-index: 5;
            cursor: inherit;
            transition: transform 0.35s cubic-bezier(.22, 1, .36, 1), filter 0.35s ease;
            animation: floatIdle 6s ease-in-out infinite;
            filter: drop-shadow(0 0 0px transparent);
            outline: none;
        }

        .nav-object:hover,
        .nav-object:focus-visible {
            transform: scale(1.22) !important;
            filter: drop-shadow(0 0 18px currentColor);
        }

        .nav-object svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Arranged side-by-side at the bottom center. */
        .nav-obj-1 {
            /* About */
            bottom: 12%;
            left: calc(50% - 205px);
            width: 80px;
            height: 80px;
            color: #FF2D6B;
            animation-delay: 0s;
        }

        .nav-obj-2 {
            /* Projects */
            bottom: 12%;
            left: calc(50% - 91px);
            width: 80px;
            height: 80px;
            color: #FFE500;
            animation-delay: 1.5s;
        }

        .nav-obj-3 {
            /* Links */
            bottom: 12%;
            left: calc(50% + 21px);
            width: 80px;
            height: 80px;
            color: #00FF66;
            animation-delay: 3s;
        }

        .nav-obj-4 {
            /* Contact */
            bottom: 12%;
            left: calc(50% + 127px);
            width: 80px;
            height: 80px;
            color: #00F0FF;
            animation-delay: 4.5s;
        }

        /* Labels */
        .nav-label {
            position: absolute;
            left: 50%;
            bottom: -22px;
            transform: translateX(-50%);
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: inherit;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .nav-object:hover .nav-label,
        .nav-object:focus-visible .nav-label {
            opacity: 1;
        }

        @keyframes floatIdle {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            25% {
                transform: translateY(-10px) rotate(3deg);
            }

            75% {
                transform: translateY(6px) rotate(-2deg);
            }
        }

        .shape-line {
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: shapeStrokeDraw 1.8s ease forwards;
        }

        .solid-stroke {
            stroke-dasharray: none;
            stroke-dashoffset: 0;
            animation: none;
        }

        .shape-fill {
            fill: currentColor;
            opacity: 0.12;
        }

        @keyframes shapeStrokeDraw {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Floating Icons over Static Podiums */
        .icon-bob {
            animation: iconFloat 2.5s ease-in-out infinite alternate;
            transform-origin: center;
        }

        @keyframes iconFloat {
            0% {
                transform: translateY(2px);
            }

            100% {
                transform: translateY(-4px);
            }
        }

        /* ═══════════════════════════════════════════════════
   SVG ANIMATION DEFINITIONS
   ═══════════════════════════════════════════════════ */

        /* Avatar (nav-obj-1) */
        .avatar-hair-group {
            transform-origin: 36px 36px;
            transition: transform 0.3s ease;
        }

        @keyframes rgbGlow {

            0%,
            100% {
                stroke: #FF0000;
                filter: drop-shadow(0 0 4px #FF0000);
            }

            33% {
                stroke: #00FF00;
                filter: drop-shadow(0 0 4px #00FF00);
            }

            66% {
                stroke: #0000FF;
                filter: drop-shadow(0 0 4px #0000FF);
            }
        }

        @keyframes hairWave {
            0% {
                transform: skewX(-5deg) rotate(-2deg);
            }

            100% {
                transform: skewX(12deg) rotate(6deg);
            }
        }

        .wind-container {
            position: absolute;
            top: 0;
            left: -20px;
            width: 110px;
            height: 72px;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
            border-radius: 10px;
        }

        .wind-particle {
            position: absolute;
            background: linear-gradient(90deg, transparent, #00F0FF, transparent);
            height: 2px;
            width: 30px;
            opacity: 0;
            animation: windStreakAnim 0.6s linear forwards;
        }

        @keyframes windStreakAnim {
            0% {
                transform: translateX(80px);
                opacity: 0;
            }

            20%,
            80% {
                opacity: 0.8;
            }

            100% {
                transform: translateX(-40px);
                opacity: 0;
            }
        }

        /* Projects/F1 (nav-obj-2) */
        .wheel-rear {
            transform-origin: 22px 50px;
        }

        .wheel-front {
            transform-origin: 62px 50px;
        }

        @keyframes wheelSpin {
            to {
                transform: rotate(360deg);
            }
        }

        .smoke-container {
            position: absolute;
            bottom: 25px;
            left: -10px;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: -1;
        }

        .smoke-particle {
            position: absolute;
            background: #F5F5F5;
            border-radius: 50%;
            opacity: 0.6;
            animation: smokeAnim 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes smokeAnim {
            0% {
                transform: scale(0.5) translate(0, 0);
                opacity: 0.7;
            }

            100% {
                transform: scale(3.5) translate(-15px, -8px);
                opacity: 0;
            }
        }

        /* Links/Controller (nav-obj-3) */
        .play-triangle {
            transition: opacity 0.2s ease;
        }

        .rec-dot {
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        @keyframes pulseRec {
            0% {
                transform: scale(0.9);
                filter: drop-shadow(0 0 2px #FF0000);
            }

            100% {
                transform: scale(1.1);
                filter: drop-shadow(0 0 8px #FF0000);
            }
        }

        .combo-btn {
            transition: opacity 0.05s ease;
        }

        .combo-btn.pressed {
            opacity: 1 !important;
        }

        .broadcast-waves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1.5px solid #FF0000;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes broadcastEmit {
            0% {
                width: 10px;
                height: 10px;
                opacity: 1;
                border-width: 1.5px;
            }

            100% {
                width: 70px;
                height: 70px;
                opacity: 0;
                border-width: 0.5px;
            }
        }

        /* Contact/Automation Nodes (nav-obj-4) */
        .data-packet {
            opacity: 0;
        }

        .hidden-node-icon {
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        @keyframes gearWhirr {
            to {
                transform: rotate(180deg);
            }
        }

        @keyframes shootPacket1 {
            0% {
                transform: translate(0, 0);
                opacity: 1;
                filter: drop-shadow(0 0 4px #FFE500);
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translate(18px, 16px);
                opacity: 0;
            }
        }

        @keyframes shootPacket2 {
            0% {
                transform: translate(0, 0);
                opacity: 1;
                filter: drop-shadow(0 0 4px #00F0FF);
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translate(18px, -24px);
                opacity: 0;
            }
        }

        @keyframes checkDraw {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes checkGlow {

            0%,
            100% {
                filter: drop-shadow(0 0 0px #00FF00);
            }

            50% {
                filter: drop-shadow(0 0 12px #00FF00);
                stroke: #00FF00;
            }
        }

        /* ═══════════════════════════════════════════════════
   DESKTOP HOVER TRIGGERS
   ═══════════════════════════════════════════════════ */
        @media (hover: hover) and (pointer: fine) {

            .nav-obj-1:hover .rgb-glasses,
            .nav-obj-1:focus-visible .rgb-glasses {
                stroke-dasharray: none;
                animation: rgbGlow 1.5s linear infinite !important;
            }

            .nav-obj-1:hover .avatar-hair-group,
            .nav-obj-1:focus-visible .avatar-hair-group {
                animation: hairWave 0.4s ease-in-out infinite alternate;
            }

            .nav-obj-2:hover .wheel,
            .nav-obj-2:focus-visible .wheel {
                animation: wheelSpin 0.3s linear infinite;
            }

            .nav-obj-3:hover .play-triangle,
            .nav-obj-3:focus-visible .play-triangle {
                opacity: 0;
            }

            .nav-obj-3:hover .rec-dot,
            .nav-obj-3:focus-visible .rec-dot {
                opacity: 1;
                animation: pulseRec 0.8s infinite alternate;
            }

            .nav-obj-3:hover .broadcast-waves,
            .nav-obj-3:focus-visible .broadcast-waves {
                animation: broadcastEmit 1s infinite ease-out;
            }

            .nav-obj-4:hover .default-n1,
            .nav-obj-4:focus-visible .default-n1,
            .nav-obj-4:hover .default-n2,
            .nav-obj-4:focus-visible .default-n2,
            .nav-obj-4:hover .default-n3,
            .nav-obj-4:focus-visible .default-n3 {
                opacity: 0;
                transition: opacity 0.1s;
            }

            .nav-obj-4:hover .hidden-node-icon,
            .nav-obj-4:focus-visible .hidden-node-icon {
                opacity: 1;
            }

            .nav-obj-4:hover .node-2-group,
            .nav-obj-4:focus-visible .node-2-group {
                animation: gearWhirr 0.25s cubic-bezier(0.4, 0, 0.2, 1) 0.25s forwards;
            }

            .nav-obj-4:hover .pkt-1,
            .nav-obj-4:focus-visible .pkt-1 {
                animation: shootPacket1 0.25s linear forwards;
            }

            .nav-obj-4:hover .pkt-2,
            .nav-obj-4:focus-visible .pkt-2 {
                animation: shootPacket2 0.25s linear 0.25s forwards;
            }

            .nav-obj-4:hover .check-icon,
            .nav-obj-4:focus-visible .check-icon {
                stroke-dasharray: 20;
                stroke-dashoffset: 20;
                animation: checkDraw 0.2s ease forwards 0.5s, checkGlow 0.6s ease 0.5s;
            }
        }

        /* ═══════════════════════════════════════════════════
   FUN FACT GENERATOR UI
   ═══════════════════════════════════════════════════ */
        #funFactWrapper {
            position: absolute;
            bottom: 70px;
            right: 32px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        #funFactBtn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #141414;
            border: 2px solid #FFE500;
            color: #FFE500;
            cursor: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 229, 0, 0.2);
            animation: pulseSpark 2s infinite alternate;
            outline: none;
        }

        @keyframes pulseSpark {
            0% {
                box-shadow: 0 0 5px rgba(255, 229, 0, 0.2);
                transform: translateY(0);
            }

            100% {
                box-shadow: 0 0 15px rgba(255, 229, 0, 0.5);
                transform: translateY(-3px);
            }
        }

        #funFactBtn:hover,
        #funFactBtn:focus-visible {
            transform: scale(1.1) translateY(-3px);
            background: #FFE500;
            color: #0D0D0D;
            box-shadow: 0 0 20px rgba(255, 229, 0, 0.7);
            animation: none;
        }

        #funFactBtn svg {
            width: 22px;
            height: 22px;
        }

        #funFactTooltip {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(4px);
            border: 1px solid #FFE500;
            padding: 14px 20px 14px 14px;
            border-radius: 8px;
            width: max-content;
            max-width: 260px;
            color: #F5F5F5;
            font-size: 0.8rem;
            line-height: 1.5;
            text-align: left;
            transform-origin: bottom right;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0.8) translateY(10px);
            pointer-events: none;
            position: relative;
        }

        #funFactTooltip.show {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        #funFactTooltip strong {
            color: #FFE500;
            display: block;
            margin-bottom: 4px;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #funFactClose {
            position: absolute;
            top: 4px;
            right: 6px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.1rem;
            cursor: inherit;
            line-height: 1;
            padding: 0 4px;
            outline: none;
        }

        #funFactClose:hover,
        #funFactClose:focus-visible {
            color: #F5F5F5;
        }


        /* ═══════════════════════════════════════════════════
   MOBILE & TOUCH DEVICE RESPONSIVE LAYOUT
   ═══════════════════════════════════════════════════ */
        @media (pointer: fine) {

            html,
            body,
            #modalLinksContainer a {
                cursor: none;
            }
        }

        @media (max-width: 768px) {
            #mainTitle {
                width: 95vw;
            }

            /* Stop icon bob on mobile for cleaner tapping */
            .icon-bob {
                animation: none !important;
                transform: none !important;
            }

            /* 2x2 Grid for mobile bottom dock */
            .nav-obj-1 {
                left: calc(50% - 90px);
                bottom: 24%;
                transform: scale(0.85);
                animation: none;
            }

            .nav-obj-2 {
                left: calc(50% + 14px);
                bottom: 24%;
                transform: scale(0.85);
                animation: none;
            }

            .nav-obj-3 {
                left: calc(50% - 90px);
                bottom: 10%;
                transform: scale(0.85);
                animation: none;
            }

            .nav-obj-4 {
                left: calc(50% + 14px);
                bottom: 10%;
                transform: scale(0.85);
                animation: none;
            }

            .corner-tag.top-left,
            .corner-tag.top-right {
                display: none;
            }

            #funFactWrapper {
                top: 20px;
                bottom: auto;
                right: 20px;
                flex-direction: column-reverse;
            }

            #funFactTooltip {
                transform-origin: top right;
                transform: scale(0.8) translateY(-10px);
            }

            /* Adjust modal padding for readability on tight screens */
            #modalCard {
                padding: 32px 24px 24px;
            }
        }

        /* ═══════════════════════════════════════════════════
   MODAL OVERLAY & LINKS
   ═══════════════════════════════════════════════════ */
        #modalOverlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
        }

        #modalOverlay.active {
            pointer-events: all;
            opacity: 1;
        }

        #modalBg {
            position: absolute;
            inset: 0;
            background: rgba(13, 13, 13, 0.82);
            backdrop-filter: blur(6px);
            opacity: 0;
            transition: opacity 0.45s ease;
        }

        #modalOverlay.active #modalBg {
            opacity: 1;
        }

        #modalCard {
            position: relative;
            width: min(88vw, 560px);
            padding: 48px 40px 40px;
            border: 2px solid #333;
            background: #141414;
            transform: scale(0.3);
            opacity: 0;
            transition: transform 0.55s cubic-bezier(.22, 1, .36, 1), opacity 0.45s ease, border-color 0.4s ease;
        }

        #modalOverlay.active #modalCard {
            transform: scale(1);
            opacity: 1;
        }

        #modalCard h2 {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: 0.04em;
        }

        #modalCard p {
            font-size: 0.92rem;
            line-height: 1.65;
            color: #aaa;
            margin-bottom: 20px;
        }

        #modalLinksContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        #modalLinksContainer a {
            display: inline-block;
            padding: 10px 28px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            text-decoration: none;
            border: 2px solid var(--btn-accent, #F5F5F5);
            color: var(--btn-accent, #F5F5F5);
            transition: background 0.3s ease, color 0.3s ease;
        }

        #modalLinksContainer a:hover,
        #modalLinksContainer a:focus-visible {
            background: var(--btn-accent, #F5F5F5);
            color: #0D0D0D;
            outline: none;
        }

        #modalClose {
            position: absolute;
            top: 14px;
            right: 16px;
            width: 32px;
            height: 32px;
            background: none;
            border: none;
            cursor: inherit;
            color: #666;
            transition: color 0.2s ease, transform 0.3s ease;
        }

        #modalClose:hover,
        #modalClose:focus-visible {
            color: #F5F5F5;
            transform: rotate(90deg);
            outline: none;
        }

        #modalClose svg {
            width: 100%;
            height: 100%;
        }

        #morphCircle {
            position: fixed;
            z-index: 99;
            border-radius: 50%;
            pointer-events: none;
            transform: scale(0);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(.22, 1, .36, 1), opacity 0.3s ease 0.3s;
        }

        #morphCircle.expanding {
            transform: scale(1);
            opacity: 1;
            transition: transform 0.6s cubic-bezier(.22, 1, .36, 1), opacity 0.15s ease;
        }

        /* ═══════════════════════════════════════════════════
   CORNER DECORATIONS
   ═══════════════════════════════════════════════════ */
        .corner-tag {
            position: absolute;
            z-index: 3;
            font-size: 0.6rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #444;
            opacity: 0;
            animation: fadeUp 1s ease 3.4s forwards;
        }

        .corner-tag.top-left {
            top: 28px;
            left: 32px;
        }

        const cCanvas = document.getElementById('cursorCanvas');
        const cCtx = cCanvas.getContext('2d');

        function resizeCursorCanvas() {
            cCanvas.width = window.innerWidth;
            cCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCursorCanvas);
        resizeCursorCanvas();

        const cursorNodes = [
            { x: mouseX, y: mouseY, color: '#00F0FF', radius: 4.5, speed: 0.4 },
            { x: mouseX, y: mouseY, color: '#FF2D6B', radius: 3.5, speed: 0.3 },
            { x: mouseX, y: mouseY, color: '#FFE500', radius: 2.5, speed: 0.25 }
        ];

        function drawLineBetween(p1, p2) {
            const dx = p2.x - p1.x; const dy = p2.y - p1.y;
            if (Math.abs(dx) < 0.1 && Math.abs(dy) < 0.1) return;

            const grad = cCtx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
            grad.addColorStop(0, p1.color); grad.addColorStop(1, p2.color);

            cCtx.beginPath(); cCtx.moveTo(p1.x, p1.y); cCtx.lineTo(p2.x, p2.y);
            cCtx.strokeStyle = grad; cCtx.lineWidth = 1.5; cCtx.globalAlpha = 0.5;
            cCtx.stroke(); cCtx.globalAlpha = 1.0;
        }

        function animatePipelineCursor() {
            if (window.matchMedia("(pointer: coarse)").matches || !isTabActive) {
                requestAnimationFrame(animatePipelineCursor);
                return;
            }

            cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
            cursorNodes[0].x += (mouseX - cursorNodes[0].x) * cursorNodes[0].speed;
            cursorNodes[0].y += (mouseY - cursorNodes[0].y) * cursorNodes[0].speed;
            for (let i = 1; i < cursorNodes.length; i++) {
                cursorNodes[i].x += (cursorNodes[i - 1].x - cursorNodes[i].x) * cursorNodes[i].speed;
                cursorNodes[i].y += (cursorNodes[i - 1].y - cursorNodes[i].y) * cursorNodes[i].speed;
            }
            for (let i = 0; i < cursorNodes.length - 1; i++) { drawLineBetween(cursorNodes[i], cursorNodes[i + 1]); }
            cursorNodes.forEach(node => {
                cCtx.beginPath(); cCtx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                cCtx.fillStyle = node.color; cCtx.shadowBlur = 10; cCtx.shadowColor = node.color;
                cCtx.fill(); cCtx.shadowBlur = 0;
            });
            requestAnimationFrame(animatePipelineCursor);
        }
        animatePipelineCursor();

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Function to play sound ONLY for Fun Fact button
        function playFunFactSound() {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.3);
        }

            if (comboInterval) return;
            comboInterval = setInterval(() => {
                comboBtns.forEach(b => b.classList.remove('pressed'));
                for (let i = 0; i < Math.floor(Math.random() * 3) + 1; i++) {
                    comboBtns[Math.floor(Math.random() * comboBtns.length)].classList.add('pressed');
                }
            }, 80);
        }
        function stopControllerFX() {
            clearInterval(comboInterval); comboInterval = null; comboBtns.forEach(b => b.classList.remove('pressed'));
        }
        navLinks.addEventListener('mouseenter', () => { if (!window.matchMedia("(pointer: coarse)").matches) triggerControllerFX(); });
        navLinks.addEventListener('mouseleave', stopControllerFX);
        navLinks.addEventListener('focus', triggerControllerFX);
        navLinks.addEventListener('blur', stopControllerFX);

        /* ═══════════════════════════════════════════════════
           FUN FACT GENERATOR LOGIC
           ═══════════════════════════════════════════════════ */
        const funFacts = [
            "The first computer bug was an actual moth found in a Harvard Mark II computer in 1947.",
            "Python was named after the British comedy troupe Monty Python, not the snake.",
            "A single quantum computer could theoretically solve problems taking classical computers billions of years.",
            "The Apollo 11 guidance computer had less processing power than a modern USB-C charger.",
            "n8n was founded in 2019 and is a fair-code licensed tool, perfect for self-hosting.",
            "AI image generators don't 'copy' images; they hallucinate details from noise based on learned patterns.",
            "The first webpage went live on August 6, 1991, dedicated to information on the World Wide Web.",
            "Over 90% of the world's currency only exists digitally on computers.",
            "The first 1GB hard drive, announced in 1980, weighed over 500 pounds and cost $40,000.",
            "The name 'Bluetooth' comes from a 10th-century Danish King, Harald Bluetooth, who united Scandinavian tribes.",
            "There is a programming language called 'Brainfuck' designed specifically to be as difficult as possible to use.",
            "The QWERTY keyboard layout was originally designed to slow typists down to prevent mechanical typewriters from jamming.",
            "CAPTCHA stands for 'Completely Automated Public Turing test to tell Computers and Humans Apart'.",
            "The world's first webcam was created at Cambridge University just to monitor a coffee pot.",
            "C++ was originally called 'C with Classes'.",
            "Ada Lovelace is widely recognized as the world's first computer programmer, writing an algorithm for a computing machine in the mid-1800s.",
            "Domain name registration used to be completely free until 1995.",
            "JavaScript was created in just 10 days in May 1995 by Brendan Eich.",
            "The term 'Robot' comes from the Czech word 'robota', meaning forced labor.",
            "The average typist's left hand does about 56% of the typing."
        ];

        const funFactBtn = document.getElementById('funFactBtn');
        const funFactTooltip = document.getElementById('funFactTooltip');
        const funFactText = document.getElementById('funFactText');
        const funFactClose = document.getElementById('funFactClose');
        const funFactWrapper = document.getElementById('funFactWrapper');

        funFactBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            playFunFactSound();
            const randomIndex = Math.floor(Math.random() * funFacts.length);
            funFactText.textContent = funFacts[randomIndex];
            funFactTooltip.classList.add('show');
        });

        funFactClose.addEventListener('click', (e) => {
            e.stopPropagation();
            funFactTooltip.classList.remove('show');
        });

        document.addEventListener('click', (e) => {
            if (!funFactWrapper.contains(e.target) && funFactTooltip.classList.contains('show')) {
                funFactTooltip.classList.remove('show');
            }
        });

        /* ═══════════════════════════════════════════════════
           MOUSE-REACTIVE SVG TITLE (WITH SHOCKWAVE EFFECT)
           ═══════════════════════════════════════════════════ */
        const mainTitleSvg = document.getElementById('mainTitle');
        const titleWrap = document.getElementById('titleWrap');
        const strokeTexts = document.querySelectorAll('.title-stroke');

        function animateTitle() {
            if (!isTabActive) {
                requestAnimationFrame(animateTitle);
                return;
            }
            const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
            const dx = (mouseX - cx) / cx; const dy = (mouseY - cy) / cy;
            titleWrap.style.transform = `translate(${dx * 12}px, ${dy * 8}px)`;
            strokeTexts.forEach((el, i) => {
                const factor = (i - 1) * 6;
                el.setAttribute('dx', (dx * factor).toFixed(2)); el.setAttribute('dy', (dy * factor).toFixed(2));
            });
            requestAnimationFrame(animateTitle);
        }
        animateTitle();

        // Trigger Canvas Shockwave on Title Click
        mainTitleSvg.addEventListener('click', () => {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            particles.forEach(p => {
                const dx = p.x - cx;
                const dy = p.y - cy;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;

                // Massive velocity boost
                const force = Math.random() * 25 + 15;

                p.vx = (dx / dist) * force;
                p.vy = (dy / dist) * force;

                // Rapid kinetic spin
                p.rotSpeed = (Math.random() - 0.5) * 0.8;
            });
        });

        /* ═══════════════════════════════════════════════════
           FLOATING NAV — MOUSE PARALLAX
           ═══════════════════════════════════════════════════ */
        const navObjects = document.querySelectorAll('.nav-object');
        function animateNav() {
            if (!isTabActive) {
                requestAnimationFrame(animateNav);
                return;
            }
            const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
            const dx = (mouseX - cx) / cx; const dy = (mouseY - cy) / cy;
            navObjects.forEach((obj, i) => {
                const depth = 14 + i * 6; const baseTransform = getFloatTransform(obj, performance.now(), i);
                obj.style.transform = `translate(${dx * depth}px, ${dy * depth}px) ${baseTransform}`;
            });
            requestAnimationFrame(animateNav);
        }
        function getFloatTransform(el, t, i) {
            const period = 6000 + i * 1500; const phase = (t % period) / period * Math.PI * 2;
            const yOff = Math.sin(phase) * 10; const rot = Math.sin(phase * 0.7) * 3;
            return `translateY(${yOff}px) rotate(${rot}deg)`;
        }
        navObjects.forEach(o => o.style.animation = 'none');
        animateNav();

        /* ═══════════════════════════════════════════════════
           MODAL / MORPH INTERACTION & ACCESSIBILITY
           ═══════════════════════════════════════════════════ */
        const overlay = document.getElementById('modalOverlay');
        const card = document.getElementById('modalCard');
        const mTitle = document.getElementById('modalTitle');
        const mBody = document.getElementById('modalBody');
        const mClose = document.getElementById('modalClose');
        const mBg = document.getElementById('modalBg');
        const morph = document.getElementById('morphCircle');

        function openModal(section, originEl) {
            clearInterval(smokeInterval); clearInterval(auraWindInterval); stopControllerFX();

            const data = SECTIONS[section]; if (!data) return;
            mTitle.textContent = data.title;
            mBody.textContent = data.body;

            const linksContainer = document.getElementById('modalLinksContainer');
            linksContainer.innerHTML = '';

            if (data.linksList) {
                data.linksList.forEach(linkData => {
                    const a = document.createElement('a');
                    a.href = linkData.url; a.textContent = linkData.text; a.target = "_blank"; a.rel = "noopener";
                    a.style.setProperty('--btn-accent', data.accent);
                    linksContainer.appendChild(a);
                });
            }

            card.style.borderColor = data.accent;
            mTitle.style.color = data.accent;

            const rect = originEl.getBoundingClientRect();
            const cx = rect.left + rect.width / 2; const cy = rect.top + rect.height / 2;
            const maxDim = Math.max(window.innerWidth, window.innerHeight) * 2.5;

            morph.style.width = maxDim + 'px'; morph.style.height = maxDim + 'px';
            morph.style.left = (cx - maxDim / 2) + 'px'; morph.style.top = (cy - maxDim / 2) + 'px';
            morph.style.background = data.accent; morph.style.opacity = '0.08';

            requestAnimationFrame(() => {
                morph.classList.add('expanding');
                setTimeout(() => {
                    overlay.classList.add('active'); overlay.setAttribute('aria-hidden', 'false'); mClose.focus();
                }, 250);
            });
        }

        function closeModal() {
            overlay.classList.remove('active'); overlay.setAttribute('aria-hidden', 'true');
            setTimeout(() => { morph.classList.remove('expanding'); }, 350);
        }

        navObjects.forEach(obj => {
            obj.addEventListener('click', () => { openModal(obj.dataset.section, obj); });
            obj.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(obj.dataset.section, obj); }
            });
        });

        mClose.addEventListener('click', closeModal);
        mBg.addEventListener('click', closeModal);
        document.addEventListener('keydown', e => { if (e.key === 'Escape' && overlay.classList.contains('active')) closeModal(); });

        /* ═══════════════════════════════════════════════════
           GENERATIVE BACKGROUND — CANVAS (CUSTOM 2D SHAPES)
           ═══════════════════════════════════════════════════ */
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);

        const SHAPE_PATHS = [
            new Path2D("M 0.1 0 A 0.1 0.1 0 1 1 -0.1 0 A 0.1 0.1 0 1 1 0.1 0 M 0.1 -0.5 A 0.1 0.1 0 1 1 -0.1 -0.5 A 0.1 0.1 0 1 1 0.1 -0.5 M -0.33 0.25 A 0.1 0.1 0 1 1 -0.53 0.25 A 0.1 0.1 0 1 1 -0.33 0.25 M 0.53 0.25 A 0.1 0.1 0 1 1 0.33 0.25 A 0.1 0.1 0 1 1 0.53 0.25 M 0 -0.1 L 0 -0.4 M -0.08 0.05 L -0.35 0.2 M 0.08 0.05 L 0.35 0.2"),
            new Path2D("M -0.3 -0.2 h 0.5 v 0.6 h -0.2 v -0.4 h -0.3 z M 0.3 0.2 h -0.5 v -0.6 h 0.2 v 0.4 h 0.3 z"),
            new Path2D("M -0.5 0.2 L -0.2 0.5 L 0.5 -0.5 L 0.5 0.5 L -0.2 -0.5 L -0.5 -0.2 Z"),
            new Path2D("M -0.4 -0.4 h 0.8 v 0.8 h -0.8 z M -0.2 -0.4 v -0.2 M 0 -0.4 v -0.2 M 0.2 -0.4 v -0.2 M -0.2 0.4 v 0.2 M 0 0.4 v 0.2 M 0.2 0.4 v 0.2 M -0.4 -0.2 h -0.2 M -0.4 0 h -0.2 M -0.4 0.2 h -0.2 M 0.4 -0.2 h 0.2 M 0.4 0 h 0.2 M 0.4 0.2 h 0.2"),
            new Path2D("M -0.2 -0.5 L -0.6 0 L -0.2 0.5 M 0.2 -0.5 L 0.6 0 L 0.2 0.5"),
            new Path2D("M -0.4 -0.5 L 0.5 0 L -0.4 0.5 Z")
        ];

        const PARTICLE_COUNT = 70;
        const COLORS = ['#FFE500', '#FF2D6B', '#00F0FF', '#F5F5F5', '#00FF66'];

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;

                // Base normal speeds
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.baseVx = this.vx;
                this.baseVy = this.vy;

                this.type = Math.floor(Math.random() * 6);
                this.size = 6 + Math.random() * 8;

                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.alpha = 0.1 + Math.random() * 0.2;

                this.rot = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.015;
                this.baseRotSpeed = this.rotSpeed;

                this.parallaxDepth = 0.3 + Math.random() * 0.7;
            }

            update() {
                // Friction: Smoothly decelerate back to normal speed (post-shockwave)
                this.vx += (this.baseVx - this.vx) * 0.03;
                this.vy += (this.baseVy - this.vy) * 0.03;
                this.rotSpeed += (this.baseRotSpeed - this.rotSpeed) * 0.03;

                this.x += this.vx;
                this.y += this.vy;
                this.rot += this.rotSpeed;

                // Determine if particle is in high-speed Shockwave mode
                const isShockwave = Math.abs(this.vx) > 1.5 || Math.abs(this.vy) > 1.5;

                if (isShockwave) {
                    // Bounce off screen edges dynamically
                    if (this.x < 0) { this.x = 0; this.vx *= -1; this.baseVx *= -1; }
                    if (this.x > W) { this.x = W; this.vx *= -1; this.baseVx *= -1; }
                    if (this.y < 0) { this.y = 0; this.vy *= -1; this.baseVy *= -1; }
                    if (this.y > H) { this.y = H; this.vy *= -1; this.baseVy *= -1; }
                } else {
                    // Normal lazy wrap-around behavior
                    if (this.x < -40) this.x = W + 40;
                    if (this.x > W + 40) this.x = -40;
                    if (this.y < -40) this.y = H + 40;
                    if (this.y > H + 40) this.y = -40;
                }
            }

            draw(ctx, mx, my) {
                const cx = W / 2, cy = H / 2;
                const dx = (mx - cx) / cx * 20 * this.parallaxDepth;
                const dy = (my - cy) / cy * 20 * this.parallaxDepth;
                const px = this.x + dx;
                const py = this.y + dy;

                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.strokeStyle = this.color;
                ctx.fillStyle = this.color;

                ctx.translate(px, py);
                ctx.rotate(this.rot);
                ctx.scale(this.size, this.size);

                ctx.lineWidth = 1.5 / this.size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                ctx.stroke(SHAPE_PATHS[this.type]);

                if (this.type !== 0 && this.type !== 4) {
                    ctx.globalAlpha = this.alpha * 0.35;
                    ctx.fill(SHAPE_PATHS[this.type]);
                }

                ctx.restore();
            }
        }

        const particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());

        function drawGrid() {
            ctx.strokeStyle = 'rgba(245,245,245,0.025)'; ctx.lineWidth = 0.5; const gap = 60;
            for (let x = 0; x < W; x += gap) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
            for (let y = 0; y < H; y += gap) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
        }

        function renderBg() {
            if (isTabActive) {
                ctx.clearRect(0, 0, W, H); drawGrid();
                particles.forEach(p => { p.update(); p.draw(ctx, mouseX, mouseY); });
            }
            requestAnimationFrame(renderBg);
        }
        renderBg();
    </script>
</body>

</html>
